name: Plugin compatibility report
description: Tell us a plugin converts cleanly (or doesn't) — feeds COMPATIBILITY.md
title: "[compat] "
labels: ["compatibility"]
body:
  - type: input
    id: plugin
    attributes:
      label: Plugin and version
      placeholder: "e.g. WorldGuard 7.0.14"
    validations:
      required: true
  - type: dropdown
    id: result
    attributes:
      label: Result
      options:
        - "✅ clean — 0 blockers, boots and works"
        - "🟡 converts, but has runtime issues (describe below)"
        - "❌ doesn't work (describe below)"
    validations:
      required: true
  - type: input
    id: folia
    attributes:
      label: Folia / Minecraft version tested on
      placeholder: "e.g. folia-26.1.2-8"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      placeholder: "Required dependencies, features you tested in-game, anything that misbehaved…"
